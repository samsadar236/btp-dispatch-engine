<g>
  <rect x="430" y="490" width="460" height="84" rx="10" fill="#3b2a06" stroke="#d4a72c" stroke-width="1.5"/>
  <text x="660" y="520" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#f0c64c">F6 — dispatch decision</text>
  <text x="660" y="542" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#e3b341">officers · barricade · diversion · resource hold</text>
  <text x="660" y="560" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0852f">the central fact — operating points on calibrated probability</text>
</g>

<line x1="660" y1="574" x2="660" y2="608" stroke="#d4a72c" stroke-width="1" marker-end="url(#arrowGold)"/>

<g>
  <rect x="510" y="610" width="300" height="62" rx="8" fill="#2d1f47" stroke="#a371f7" stroke-width="1"/>
  <text x="660" y="634" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#d2b8ff">F7 — learning loop</text>
  <text x="660" y="652" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#bda3e8">outlier queue + corridor tracker</text>
