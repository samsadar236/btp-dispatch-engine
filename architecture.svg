<svg width="1320" height="900" viewBox="0 0 1320 900" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Event-Impact and Resource Recommendation Engine architecture</title>
<desc>Star-schema architecture: raw incident log is cleaned, then four models (F2 reference table, F3 conformal buffer, F4 closure model, F5 severity index) feed the central F6 dispatch decision, which feeds F7 learning loop and four consumers: news agent, alert agent, map layer, and dashboard.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#d4a72c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#a371f7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="1320" height="900" rx="14" fill="#0d1117"/>

<text x="40" y="46" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#e6edf3">Architecture</text>
<text x="40" y="68" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#8b949e">Star schema — F6 is the central decision; F2-F5 are dimensions that refine it</text>

<g>
  <rect x="520" y="90" width="280" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="660" y="120" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#c9d1d9">Raw ASTraM log</text>
</g>
<line x1="660" y1="140" x2="660" y2="170" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

<g>
  <rect x="520" y="172" width="280" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="660" y="192" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9">step0_clean.py</text>
  <text x="660" y="208" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#8b949e">canonical cleaning + audit</text>
</g>
<line x1="660" y1="222" x2="660" y2="252" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

<g>
  <rect x="520" y="254" width="280" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="660" y="274" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9">Clean datasets</text>
  <text x="660" y="290" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#8b949e">closure_clean.csv + duration_clean.csv</text>
</g>

