  <text x="805" y="396" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#8ec6ff">AUC 0.79, ECE 0.0096</text>
</g>

<g>
  <rect x="970" y="352" width="290" height="68" rx="8" fill="#0c2d6b" stroke="#388bfd" stroke-width="1"/>
